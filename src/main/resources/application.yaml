spring:
  application:
    name: notification-system

  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: notification-worker-

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
